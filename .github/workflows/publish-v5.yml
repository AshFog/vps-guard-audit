name: Publish v5.0.0

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-v5.yml

permissions:
  contents: write

concurrency:
  group: publish-v5.0.0
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: 7688e454ad2461149eaac5f0d7a3fc8437ee2090
      TAG_NAME: v5.0.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release source
        run: |
          set -euo pipefail
          git cat-file -e "$TARGET_SHA^{commit}"
          test "$(git show "$TARGET_SHA:vps-guard-audit.sh" | sed -n 's/^VERSION="\([^"]*\)"/\1/p' | head -n1)" = "5.0.0"
          git show "$TARGET_SHA:README.md" >/dev/null
          git show "$TARGET_SHA:CHANGELOG.md" | grep -q '^## 5\.0\.0'
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; verification will continue."
          fi

      - name: Build release archives
        run: |
          set -euo pipefail
          prefix="vps-guard-audit-5.0.0/"
          git archive --format=tar.gz --prefix="$prefix" "$TARGET_SHA" -o vps-guard-audit-5.0.0.tar.gz
          git archive --format=zip --prefix="$prefix" "$TARGET_SHA" -o vps-guard-audit-5.0.0.zip
          sha256sum vps-guard-audit-5.0.0.tar.gz vps-guard-audit-5.0.0.zip > SHA256SUMS

      - name: Write release notes
        run: |
          cat >"$RUNNER_TEMP/release-notes.md" <<'EOF_NOTES'
          ## VPS Guard Audit v5.0.0

          VPS Guard Audit 正式升级为面向中文用户的 Ubuntu / Debian VPS 只读安全审计框架。

          ### 主要变化

          - 安装、终端、帮助、管理命令和报告全面中文化。
          - 状态标签改为「正常 / 提醒 / 问题 / 信息 / 跳过」。
          - 引入稳定检查编号和检查注册表。
          - JSON 升级为 Schema 2.0，增加可信度、适用性、证据和前置条件。
          - 增加 quick、standard、deep 三档检测深度。
          - 增加六套中文配置档案模板。
          - 增加运行锁、符号链接防护、安装权限和 SHA-256 完整性保护。
          - 历史比较改用稳定编号和实例键。
          - v4.4.0 保留为最后一个双语稳定版本。

          ### 安装

          ```bash
          curl -fsSL https://raw.githubusercontent.com/AshFog/vps-guard-audit/main/bootstrap.sh | bash
          ```

          安装后运行：

          ```bash
          vpsga
          ```

          ### 支持系统

          - Ubuntu 26.04、24.04、22.04 LTS
          - Debian 13、12、11

          ### 下载

          - `vps-guard-audit-5.0.0.tar.gz`
          - `vps-guard-audit-5.0.0.zip`
          - `SHA256SUMS`
          EOF_NOTES

      - name: Publish GitHub release
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; skipping duplicate creation."
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_SHA" \
              --title "VPS Guard Audit v5.0.0 — 中文原生审计框架" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              vps-guard-audit-5.0.0.tar.gz \
              vps-guard-audit-5.0.0.zip \
              SHA256SUMS
          fi

      - name: Verify published release
        run: |
          set -euo pipefail
          test "$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')" = "$TAG_NAME"
          test "$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" = "false"
          test "$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq '.isPrerelease')" = "false"
          test "$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')" -eq 3
