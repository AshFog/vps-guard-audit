name: Assemble release payload

on:
  push:
    paths:
      - 'release-payload/v4.1.0.ready'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble audit script
        run: |
          cat release-payload/v4.1.0.part-* | base64 -d > vps-guard-audit.sh
          chmod +x vps-guard-audit.sh
          bash -n vps-guard-audit.sh
          test "$(bash vps-guard-audit.sh --version)" = "4.1.0"
      - name: Commit generated script
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vps-guard-audit.sh
          git commit -m "release: v4.1.0 field-tested audit improvements"
          git push
