name: Shell checks
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: bash -n vps-guard-audit.sh bootstrap.sh install.sh lib/*.sh
      - name: ShellCheck
        run: shellcheck vps-guard-audit.sh bootstrap.sh install.sh lib/*.sh
      - name: Non-mutating JSON smoke test
        run: |
          set +e
          sudo ./vps-guard-audit.sh \
            --lang en \
            --profile vps \
            --policy baseline \
            --no-update-check \
            --format json \
            --output-dir "$RUNNER_TEMP/json" \
            --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          report="$(find "$RUNNER_TEMP/json" -maxdepth 1 -name 'vps-guard-audit-*.json' -print -quit)"
          test -n "$report"
          jq -e '.version == "4.3.0" and (.summary.pass | type == "number") and (.findings | type == "array")' "$report"
      - name: Beginner report smoke tests
        run: |
          mkdir -p "$RUNNER_TEMP/zh" "$RUNNER_TEMP/en"
          set +e
          sudo ./vps-guard-audit.sh --lang zh --profile vps --no-update-check --format text --output-dir "$RUNNER_TEMP/zh" --quiet
          zh_rc=$?
          sudo ./vps-guard-audit.sh --lang en --profile vps --no-update-check --format text --output-dir "$RUNNER_TEMP/en" --quiet
          en_rc=$?
          set -e
          test "$zh_rc" -ge 0 -a "$zh_rc" -le 2
          test "$en_rc" -ge 0 -a "$en_rc" -le 2
          zh_report="$(find "$RUNNER_TEMP/zh" -maxdepth 1 -name 'vps-guard-audit-*.txt' -print -quit)"
          en_report="$(find "$RUNNER_TEMP/en" -maxdepth 1 -name 'vps-guard-audit-*.txt' -print -quit)"
          grep -q '检测总结与下一步建议' "$zh_report"
          grep -q '使用 AI 获取更详细的修复方案' "$zh_report"
          grep -q 'Summary and next steps' "$en_report"
          grep -q 'Using AI for a more detailed remediation plan' "$en_report"
      - name: System install and vpsga smoke test
        run: |
          sudo ./install.sh
          test -x /usr/local/bin/vpsga
          test "$(vpsga --version)" = "4.3.0"
          mkdir -p "$RUNNER_TEMP/installed"
          set +e
          vpsga \
            --lang en \
            --profile vps \
            --no-update-check \
            --format json \
            --output-dir "$RUNNER_TEMP/installed" \
            --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          report="$(find "$RUNNER_TEMP/installed" -maxdepth 1 -name 'vps-guard-audit-*.json' -print -quit)"
          test -n "$report"
          jq -e '.version == "4.3.0"' "$report"
