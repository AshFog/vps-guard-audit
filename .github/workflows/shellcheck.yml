name: Shell checks
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: bash -n vps-guard-audit.sh bootstrap.sh install.sh
      - name: ShellCheck
        run: shellcheck vps-guard-audit.sh bootstrap.sh install.sh
