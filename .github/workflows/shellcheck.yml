name: Shell checks

on:
  push:
  pull_request:

jobs:
  repository-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Bash syntax
        run: bash -n vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh lib/*.sh

      - name: ShellCheck
        id: shellcheck
        continue-on-error: true
        run: |
          set +e
          {
            shellcheck -x -e SC2034 vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh
            core_rc=$?
            shellcheck -x -e SC2034,SC2154 lib/*.sh
            module_rc=$?
            exit $((core_rc != 0 || module_rc != 0))
          } >"$RUNNER_TEMP/shellcheck.log" 2>&1
          rc=$?
          cat "$RUNNER_TEMP/shellcheck.log"
          exit "$rc"

      - name: Upload ShellCheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-diagnostics
          path: ${{ runner.temp }}/shellcheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Documentation links and removed features
        run: |
          test -s README.md
          test -s README.zh-CN.md
          grep -q '\[简体中文\](README.zh-CN.md)' README.md
          grep -q '\[English\](README.md)' README.zh-CN.md
          ! grep -R -nE 'vpsga (open|serve)|HTML_REPORT|generate_html_report' -- README.md README.zh-CN.md vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh lib

      - name: Non-mutating JSON smoke test
        run: |
          mkdir -p "$RUNNER_TEMP/json"
          set +e
          sudo ./vps-guard-audit.sh --lang en --profile vps --policy baseline --no-update-check --no-history --format json --output-dir "$RUNNER_TEMP/json" --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          report="$(find "$RUNNER_TEMP/json" -maxdepth 1 -name 'vpsga-*.json' -print -quit)"
          test -n "$report"
          jq -e '.version == "4.4.0" and (.summary.pass | type == "number") and (.findings | type == "array")' "$report"

      - name: Bilingual report bundle smoke tests
        run: |
          mkdir -p "$RUNNER_TEMP/zh" "$RUNNER_TEMP/en"
          set +e
          sudo ./vps-guard-audit.sh --lang zh --profile vps --no-update-check --no-history --format both --output-dir "$RUNNER_TEMP/zh" --quiet
          zh_rc=$?
          sudo ./vps-guard-audit.sh --lang en --profile vps --no-update-check --no-history --format both --output-dir "$RUNNER_TEMP/en" --quiet
          en_rc=$?
          set -e
          test "$zh_rc" -ge 0 -a "$zh_rc" -le 2
          test "$en_rc" -ge 0 -a "$en_rc" -le 2
          for dir in zh en; do
            test "$(find "$RUNNER_TEMP/$dir" -maxdepth 1 -name 'vpsga-*-full.txt' | wc -l)" -eq 1
            test "$(find "$RUNNER_TEMP/$dir" -maxdepth 1 -name 'vpsga-*-ai.txt' | wc -l)" -eq 1
            test "$(find "$RUNNER_TEMP/$dir" -maxdepth 1 -name 'vpsga-*.json' | wc -l)" -eq 1
            test "$(find "$RUNNER_TEMP/$dir" -maxdepth 1 -name 'vpsga-*.html' | wc -l)" -eq 0
          done
          zh_full="$(find "$RUNNER_TEMP/zh" -name 'vpsga-*-full.txt' -print -quit)"
          zh_ai="$(find "$RUNNER_TEMP/zh" -name 'vpsga-*-ai.txt' -print -quit)"
          en_full="$(find "$RUNNER_TEMP/en" -name 'vpsga-*-full.txt' -print -quit)"
          en_ai="$(find "$RUNNER_TEMP/en" -name 'vpsga-*-ai.txt' -print -quit)"
          grep -q '检测总结与下一步建议' "$zh_full"
          grep -q 'AI 脱敏报告' "$zh_ai"
          grep -q 'Summary and next steps' "$en_full"
          grep -q 'AI-Safe Report' "$en_ai"

      - name: History comparison smoke test
        run: |
          mkdir -p "$RUNNER_TEMP/history-reports" "$RUNNER_TEMP/history-state"
          export VPSGA_HISTORY_DIR="$RUNNER_TEMP/history-state"
          set +e
          sudo -E ./vps-guard-audit.sh --lang en --profile vps --no-update-check --format text --output-dir "$RUNNER_TEMP/history-reports" --quiet
          first_rc=$?
          sleep 1
          sudo -E ./vps-guard-audit.sh --lang en --profile vps --no-update-check --format text --output-dir "$RUNNER_TEMP/history-reports" --quiet
          second_rc=$?
          set -e
          test "$first_rc" -ge 0 -a "$first_rc" -le 2
          test "$second_rc" -ge 0 -a "$second_rc" -le 2
          test "$(find "$RUNNER_TEMP/history-state" -name 'vpsga-*.state' | wc -l)" -eq 2
          latest="$(find "$RUNNER_TEMP/history-reports" -name 'vpsga-*-full.txt' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)"
          grep -q 'Compared with the previous audit' "$latest"

      - name: Fail on ShellCheck diagnostics
        if: steps.shellcheck.outcome == 'failure'
        run: exit 1

  installation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Clean system installation
        id: clean_install
        continue-on-error: true
        run: |
          set +e
          {
            set -euxo pipefail
            sudo rm -rf /usr/local/lib/vps-guard-audit
            sudo rm -f /usr/local/bin/vpsga /usr/local/sbin/vps-guard-audit
            sudo ./install.sh
            ls -la /usr/local/lib/vps-guard-audit
            ls -la /usr/local/lib/vps-guard-audit/current/
            test -x /usr/local/bin/vpsga
            test -L /usr/local/lib/vps-guard-audit/current
            test "$(/usr/local/bin/vpsga --version)" = "4.4.0"
            help_output="$(/usr/local/bin/vpsga --help)"
            grep -q 'vpsga \[options\]' <<<"$help_output"
            ! grep -q 'sudo ./vps-guard-audit.sh' <<<"$help_output"
            /usr/local/bin/vpsga doctor
          } >"$RUNNER_TEMP/clean-install.log" 2>&1
          rc=$?
          cat "$RUNNER_TEMP/clean-install.log"
          exit "$rc"

      - name: Upload clean-install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clean-install-diagnostics
          path: ${{ runner.temp }}/clean-install.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after clean-install failure
        if: steps.clean_install.outcome == 'failure'
        run: exit 1

      - name: Legacy current-directory migration regression test
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/local/lib/vps-guard-audit
          sudo mkdir -p /usr/local/lib/vps-guard-audit/current/lib
          sudo cp vps-guard-audit.sh vpsga-manager.sh /usr/local/lib/vps-guard-audit/current/
          sudo cp lib/*.sh /usr/local/lib/vps-guard-audit/current/lib/
          test -d /usr/local/lib/vps-guard-audit/current
          test ! -L /usr/local/lib/vps-guard-audit/current
          sudo ./install.sh
          test -L /usr/local/lib/vps-guard-audit/current
          resolved="$(readlink -f /usr/local/lib/vps-guard-audit/current)"
          test "$resolved" = "/usr/local/lib/vps-guard-audit/releases/4.4.0"
          test ! -e /usr/local/lib/vps-guard-audit/current/4.4.0
          test "$(/usr/local/bin/vpsga --version)" = "4.4.0"
          /usr/local/bin/vpsga doctor

      - name: Non-root command and report ownership
        run: |
          set -euxo pipefail
          out="$RUNNER_TEMP/user-owned-reports"
          mkdir -p "$out"
          test "$(stat -c %u "$out")" = "$(id -u)"
          set +e
          /usr/local/bin/vpsga --lang en --profile vps --no-update-check --no-history --format both --output-dir "$out" --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          test "$(find "$out" -maxdepth 1 -name 'vpsga-*-full.txt' | wc -l)" -eq 1
          test "$(find "$out" -maxdepth 1 -name 'vpsga-*-ai.txt' | wc -l)" -eq 1
          test "$(find "$out" -maxdepth 1 -name 'vpsga-*.json' | wc -l)" -eq 1
          while IFS= read -r report; do
            test "$(stat -c %u "$report")" = "$(id -u)"
            test "$(stat -c %a "$report")" = "600"
          done < <(find "$out" -maxdepth 1 -type f -name 'vpsga-*')

      - name: Manager command surface
        run: |
          manager_help="$(/usr/local/lib/vps-guard-audit/current/vpsga-manager.sh --help)"
          grep -q 'vpsga doctor' <<<"$manager_help"
          grep -q 'vpsga update' <<<"$manager_help"
          grep -q 'vpsga uninstall' <<<"$manager_help"
          ! grep -q 'vpsga open' <<<"$manager_help"
          ! grep -q 'vpsga serve' <<<"$manager_help"
