name: v6 开发检查

on:
  push:
  pull_request:

jobs:
  repository-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Bash 语法
        run: bash -n vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh lib/*.sh

      - name: ShellCheck
        run: |
          shellcheck -x -e SC1010,SC2005,SC2015,SC2034,SC2317 vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh
          shellcheck -x -e SC2009,SC2015,SC2034,SC2154 lib/*.sh

      - name: 中文定位和版本
        run: |
          test "$(bash ./vps-guard-audit.sh --version)" = "6.0.0-dev.7"
          help_output="$(bash ./vps-guard-audit.sh --help)"
          grep -q '用法' <<<"$help_output"
          grep -q -- '--depth quick|standard|deep' <<<"$help_output"
          ! grep -q -- '--lang' <<<"$help_output"
          grep -q '中文原生审计框架' CHANGELOG.md
          ! grep -R -n 'report-guidance-en' -- vps-guard-audit.sh vpsga-manager.sh bootstrap.sh install.sh lib

      - name: JSON Schema 2.0 快速检查
        run: |
          mkdir -p "$RUNNER_TEMP/json" "$RUNNER_TEMP/history"
          set +e
          sudo env VPSGA_HISTORY_DIR="$RUNNER_TEMP/history" bash ./vps-guard-audit.sh --depth quick --profile general --no-history --format json --output-dir "$RUNNER_TEMP/json" --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          report="$(find "$RUNNER_TEMP/json" -maxdepth 1 -name 'vpsga-*.json' -print -quit)"
          jq -e '.version == "6.0.0-dev.7" and .schema_version == "2.0" and .language == "zh-CN" and .depth == "quick" and (.findings | type == "array") and (.findings[0].test_id | test("^[A-Z]+-[0-9]{4}$")) and (.findings[0].evidence | type == "array")' "$report"

      - name: 18 项加固注册表与只读计划
        run: |
          test "$(grep -c 'register_hardening_action "HARD-' lib/hardening-registry.sh)" -eq 18
          test "$(grep -c '"regular"' lib/hardening-registry.sh)" -eq 10
          test "$(grep -c '"sensitive"' lib/hardening-registry.sh)" -eq 8
          mkdir -p "$RUNNER_TEMP/hardening-plan"
          set +e
          sudo bash ./vps-guard-audit.sh plan --depth quick --no-history --no-update-check --format json --output-dir "$RUNNER_TEMP/hardening-plan" --quiet >"$RUNNER_TEMP/plan.txt"
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          grep -q '中文加固计划（只读预览）' "$RUNNER_TEMP/plan.txt"
          grep -q 'HARD-1001 至 HARD-1010' "$RUNNER_TEMP/plan.txt"
          bash -c '
            set -uo pipefail
            declare -a FINDING_LEGACY_IDS=(ssh.password ssh.tries fw.none pkg.unattended)
            declare -a FINDING_LEVELS=(FAIL WARN FAIL WARN)
            declare -a FINDING_IDS=(SSH-4001 SSH-4005 FW-3001 PKG-6003)
            source lib/hardening-registry.sh
            source lib/hardening-plan.sh
            collect_applicable_hardening
            test "${#APPLICABLE_REGULAR[@]}" -eq 2
            test "${#APPLICABLE_SENSITIVE[@]}" -eq 2
            for automation in "${HARDENING_AUTOMATION[@]}"; do test "$automation" = yes; done
          '

      - name: 加固事务、验证与自动回滚
        run: |
          sudo env RUNNER_TEMP="$RUNNER_TEMP" bash -c '
            set -euo pipefail
            root="$RUNNER_TEMP/hardening-root"
            state="$RUNNER_TEMP/hardening-state"
            mkdir -p "$root/etc/ssh" "$root/etc/sudoers.d" "$root/etc/cron.d"
            printf "root:x:0:0:root:/root:/bin/bash\n" >"$root/etc/passwd"
            printf "root:x:0:\n" >"$root/etc/group"
            printf "root:*:1:0:99999:7:::\n" >"$root/etc/shadow"
            printf "root:*::\n" >"$root/etc/gshadow"
            chmod 0666 "$root/etc/passwd" "$root/etc/group"
            chmod 0644 "$root/etc/shadow" "$root/etc/gshadow"
            export VPSGA_SYSTEM_ROOT="$root" VPSGA_HARDENING_STATE_ROOT="$state"
            source lib/hardening-transaction.sh
            source lib/hardening-actions.sh
            execute_hardening_action HARD-1001
            test "$(stat -c %a "$root/etc/passwd")" = 644
            test "$(stat -c %a "$root/etc/shadow")" = 640
            tx="$(find "$state" -mindepth 1 -maxdepth 1 -type d -print -quit)"
            grep -q "status=committed" "$tx/status"

            chmod 0666 "$root/etc/passwd"
            hardening_tx_begin HARD-1001
            hardening_tx_capture "$root/etc/passwd"
            chmod 0600 "$root/etc/passwd"
            hardening_tx_rollback "测试回滚"
            test "$(stat -c %a "$root/etc/passwd")" = 666
            grep -q "status=rolled_back" "$HARDENING_TX_DIR/status"
          '

      - name: SSH 与连接敏感加固故障测试
        run: |
          bash tests/test-hardening-ssh.sh
          bash tests/test-hardening-system.sh
          bash tests/test-connection-safety.sh
          bash tests/test-hardening-sensitive-ssh.sh
          bash tests/test-hardening-network.sh
          bash tests/test-hardening-workloads.sh

      - name: 中文报告与历史比较
        run: |
          mkdir -p "$RUNNER_TEMP/reports" "$RUNNER_TEMP/history"
          export VPSGA_HISTORY_DIR="$RUNNER_TEMP/history"
          set +e
          sudo -E bash ./vps-guard-audit.sh --depth quick --format both --output-dir "$RUNNER_TEMP/reports" --quiet
          first_rc=$?
          sleep 1
          sudo -E bash ./vps-guard-audit.sh --depth quick --format both --output-dir "$RUNNER_TEMP/reports" --quiet
          second_rc=$?
          set -e
          test "$first_rc" -ge 0 -a "$first_rc" -le 2
          test "$second_rc" -ge 0 -a "$second_rc" -le 2
          test "$(find "$RUNNER_TEMP/history" -name 'vpsga-*.state' | wc -l)" -eq 2
          latest="$(find "$RUNNER_TEMP/reports" -name 'vpsga-*-full.txt' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)"
          ai="$(find "$RUNNER_TEMP/reports" -name 'vpsga-*-ai.txt' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)"
          grep -q '\[正常\]\|\[提醒\]\|\[问题\]\|\[信息\]\|\[跳过\]' "$latest"
          grep -q '与上一次检测相比' "$latest"
          grep -q 'AI 脱敏报告' "$ai"

  installation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - name: 全新安装和完整性检查
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/local/lib/vps-guard-audit
          sudo rm -f /usr/local/bin/vpsga /usr/local/sbin/vps-guard-audit
          sudo bash ./install.sh
          test -x /usr/local/bin/vpsga
          test -L /usr/local/lib/vps-guard-audit/current
          test -f /usr/local/lib/vps-guard-audit/current/MANIFEST.sha256
          test "$(/usr/local/bin/vpsga --version)" = "6.0.0-dev.7"
          /usr/local/bin/vpsga doctor
          /usr/local/bin/vpsga connection-check >"$RUNNER_TEMP/connection-check.txt" 2>&1 || true
          grep -q '连接敏感加固前置检查' "$RUNNER_TEMP/connection-check.txt"
          /usr/local/bin/vpsga firewall-plan >"$RUNNER_TEMP/firewall-plan.txt" 2>&1 || true
          grep -q '当前不是可验证的 SSH 会话\|防火墙端口计划' "$RUNNER_TEMP/firewall-plan.txt"
          /usr/local/bin/vpsga workload-plan >"$RUNNER_TEMP/workload-plan.txt" 2>&1 || true
          grep -q '业务用途检查（只读）' "$RUNNER_TEMP/workload-plan.txt"
          set +e
          /usr/local/bin/vpsga connection-confirm invalid-token >"$RUNNER_TEMP/connection-confirm.txt" 2>&1
          confirm_rc=$?
          set -e
          test "$confirm_rc" -eq 65
          grep -q '第二 SSH 连接验证失败' "$RUNNER_TEMP/connection-confirm.txt"
          /usr/local/bin/vpsga rollback-auto invalid-transaction >"$RUNNER_TEMP/rollback-auto.txt" 2>&1
          grep -q '自动回滚未执行' "$RUNNER_TEMP/rollback-auto.txt"

      - name: 旧 current 目录迁移
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/local/lib/vps-guard-audit
          sudo mkdir -p /usr/local/lib/vps-guard-audit/current/lib
          sudo cp vps-guard-audit.sh vpsga-manager.sh /usr/local/lib/vps-guard-audit/current/
          sudo cp lib/*.sh /usr/local/lib/vps-guard-audit/current/lib/
          sudo bash ./install.sh
          test -L /usr/local/lib/vps-guard-audit/current
          test "$(readlink -f /usr/local/lib/vps-guard-audit/current)" = "/usr/local/lib/vps-guard-audit/releases/6.0.0-dev.7"
          /usr/local/bin/vpsga doctor

      - name: 非 root 运行与报告所有权
        run: |
          out="$RUNNER_TEMP/user-owned-reports"
          mkdir -p "$out"
          set +e
          /usr/local/bin/vpsga --depth quick --no-history --format both --output-dir "$out" --quiet
          rc=$?
          set -e
          test "$rc" -ge 0 -a "$rc" -le 2
          while IFS= read -r report; do
            test "$(stat -c %u "$report")" = "$(id -u)"
            test "$(stat -c %a "$report")" = "600"
          done < <(find "$out" -maxdepth 1 -type f -name 'vpsga-*')

      - name: 安装权限与完整性篡改检测
        run: |
          sudo chmod o+w /usr/local/lib/vps-guard-audit/current/lib/check-registry.sh
          if /usr/local/bin/vpsga doctor; then
            echo 'doctor 未发现模块篡改' >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/tampered-run"
          set +e
          /usr/local/bin/vpsga --depth quick --no-history --no-update-check --format json --output-dir "$RUNNER_TEMP/tampered-run" --quiet
          rc=$?
          set -e
          test "$rc" -eq 76
